services:
  mirofish:
    build: .
    container_name: mirofish
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
    expose:
      - "3000"
      - "5001"
    networks:
      - ai-stack_default
  services:
  delfos-api:
    build: ./backend
    container_name: delfos-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - ai-stack_default

networks:
  ai-stack_default:
    external: true
